{% extends "base.html" %}
{% block title %}Create account — TubeNews{% endblock %}

{% block content %}
<div class="card">
  <h1>Create account</h1>
  <form method="post" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="name">Display name</label>
    <input type="text" id="name" name="name" autocomplete="name"
           value="{{ request.form.get('name', '') }}" placeholder="Optional — defaults to your email local-part">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email"
           value="{{ request.form.get('email', '') }}" required autofocus>

    <label for="password">Password <span class="hint">(minimum 10 characters)</span></label>
    <input type="password" id="password" name="password" autocomplete="new-password"
           minlength="10" required>

    <label for="confirm_password">Confirm password</label>
    <input type="password" id="confirm_password" name="confirm_password"
           autocomplete="new-password" required>

    <button type="submit">Create account</button>
  </form>

  <p class="form-footer">
    Already have an account? <a href="{{ url_for('login') }}">Log in</a>
  </p>
</div>
{% endblock %}
